<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Rock City Lighting</title>
<style>
  :root { --navy: #0d1b2e; --copper: #b87338; --cream: #f5f0e8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--navy); font-family: 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 32px; padding: 40px 20px;
  }
  img { width: 80px; opacity: 0.9; }
  h1 { font-family: Georgia, serif; color: var(--cream); font-size: 1.4rem; letter-spacing: 0.06em; text-align: center; }
  .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
  .nav-tile {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(184,115,56,0.25);
    border-radius: 10px; padding: 20px; text-decoration: none; color: var(--cream);
    display: flex; flex-direction: column; gap: 6px; transition: all 0.15s;
  }
  .nav-tile:hover { background: rgba(184,115,56,0.15); border-color: var(--copper); }
  .nav-tile-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--copper); font-weight: 700; }
  .nav-tile-title { font-family: Georgia, serif; font-size: 1.05rem; }
  .nav-tile-sub { font-size: 0.75rem; color: rgba(245,240,232,0.45); margin-top: 2px; }
</style>
</head>
<body>
  <img src="/assets/brand/logo-stacked.png" alt="Rock City Lighting" onerror="this.style.display='none'">
  <h1>Admin Portal</h1>
  <div class="nav-grid">
    <a class="nav-tile" href="/admin/dashboard-mockup.html">
      <div class="nav-tile-label">Overview</div>
      <div class="nav-tile-title">Dashboard</div>
      <div class="nav-tile-sub">Jobs, invoices, clients at a glance</div>
    </a>
    <a class="nav-tile" href="/admin/schedule-mockup.html">
      <div class="nav-tile-label">Calendar</div>
      <div class="nav-tile-title">Schedule</div>
      <div class="nav-tile-sub">Upcoming jobs from Google Calendar</div>
    </a>
    <a class="nav-tile" href="/admin/client-mockup.html">
      <div class="nav-tile-label">CRM</div>
      <div class="nav-tile-title">Clients</div>
      <div class="nav-tile-sub">Full client profiles & history</div>
    </a>
    <a class="nav-tile" href="/admin/quote.html">
      <div class="nav-tile-label">Tool</div>
      <div class="nav-tile-title">Quote Builder</div>
      <div class="nav-tile-sub">Create and send quotes</div>
    </a>
  </div>
</body>
</html>
